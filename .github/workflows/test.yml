name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: |
          python -m compileall -q .

      - name: Import check
        # Discord/DB に依存しない範囲で全モジュールを import
        run: |
          python -c "
          import importlib
          mods = [
              'config',
              'core.deck','core.dice','core.hand','core.economy','core.match',
              'core.external_currency','core.global_jackpot','core.badges',
              'db.dao',
              'ui.common',
              'cogs.economy_cog','cogs.hub','cogs.help_cog','cogs.exchange',
              'cogs.stats_cog','cogs.challenges','cogs.omikuji','cogs.tournament',
              'cogs.hall','cogs.shop','cogs.admin','cogs.slot','cogs.chinchiro',
              'cogs.chohan','cogs.holdem','cogs.draw','cogs.hilo','cogs.blackjack',
              'bot',
          ]
          for m in mods:
              importlib.import_module(m)
              print('OK', m)
          "

      - name: Run tests
        run: |
          for t in tests/test_*.py; do
              echo "===== $t ====="
              python "$t"
          done
